<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paguera - Portail d'accès</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="background-glows">
        <div class="glow-1"></div>
        <div class="glow-2"></div>
    </div>

    <main class="container">
        <div class="portal-card">
            <header class="header">
                <div class="logo-icon">
                    <i data-lucide="folder-git-2"></i>
                </div>
                <h1>PAGUERA</h1>
                <p class="subtitle">Portail d'accès à mon portfolio</p>
            </header>

            <section class="info-section">
                <div class="schedule-box">
                    <div class="schedule-header">
                        <i data-lucide="clock"></i>
                        <span>Horaires de disponibilité</span>
                    </div>
                    <p class="time-range">9h &rarr; 20h</p>
                    <p class="days">Tous les jours</p>
                </div>

                <div class="status-badge" id="status-badge">
                    <span class="status-indicator-dot"></span>
                    <span class="status-text" id="status-text">Vérification en cours...</span>
                </div>
            </section>

            <section class="action-area">
                <a href="https://portfolio.paguera.fr" class="btn-primary" target="_blank" rel="noopener noreferrer">
                    <span>Accéder au Portfolio</span>
                    <i data-lucide="arrow-right"></i>
                </a>
            </section>

            <footer class="footer">
                <p>&copy; 2026 Paguera. Hébergé de manière écoresponsable.</p>
            </footer>
        </div>
    </main>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Dynamically check if the portfolio is online based on the schedule (9h to 20h)
        function updateStatus() {
            const now = new Date();
            const hour = now.getHours();
            const badge = document.getElementById('status-badge');
            const statusText = document.getElementById('status-text');

            if (hour >= 9 && hour < 20) {
                badge.className = 'status-badge online';
                statusText.textContent = 'En ligne (Disponible)';
            } else {
                badge.className = 'status-badge offline';
                statusText.textContent = 'Hors ligne (Fermé)';
            }
        }

        updateStatus();
        setInterval(updateStatus, 60000); // Update status every minute
    </script>
</body>
</html>
